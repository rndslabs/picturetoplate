<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pic-to-Plate · Ingredients Input</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..600,30..100;1,9..144,300..500,30..100&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="brand.css" />

<style>
  html, body { margin: 0; padding: 0; background: #e7e3da; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    color: #1B2420;
  }
  /* Canvas frame helpers */
  .frame-card {
    background: var(--paper);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 24px 48px -32px rgba(27,36,32,0.18);
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="brand-card.jsx"></script>
<script type="text/babel" src="p2p-mobile.jsx"></script>
<script type="text/babel" src="p2p-web.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "#6B8A5A",
  "showAIHints": true,
  "density": "comfortable",
  "displayFont": "Fraunces"
}/*EDITMODE-END*/;

const ACCENT_OPTIONS = [
  { label: 'Sage',     value: '#6B8A5A' },
  { label: 'Apricot',  value: '#E8A579' },
  { label: 'Tomato',   value: '#C2543C' },
  { label: 'Ink',      value: '#1B2420' },
];

function App() {
  const [values, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  // Apply theme + accent to :root
  React.useEffect(() => {
    const html = document.documentElement;
    html.classList.toggle('theme-dark', values.theme === 'dark');
    html.style.setProperty('--sage', values.accent);
    // derive a soft tint
    html.style.setProperty('--sage-soft', tint(values.accent, 0.78));
    html.style.setProperty('--sage-deep', shade(values.accent, 0.62));
    // display font
    const fmap = {
      'Fraunces':  "'Fraunces', 'Iowan Old Style', Georgia, serif",
      'Playfair':  "'Playfair Display', 'Iowan Old Style', Georgia, serif",
      'Inter':     "'Inter', -apple-system, system-ui, sans-serif",
    };
    html.style.setProperty('--serif', fmap[values.displayFont] || fmap['Fraunces']);
  }, [values.theme, values.accent, values.displayFont]);

  const { DesignCanvas, DCSection, DCArtboard, IOSDevice,
          ScreenDetected, ScreenConversation, ScreenPantryGrid,
          ScreenWeb, BrandCard,
          TweaksPanel, TweakSection, TweakRadio, TweakColor,
          TweakToggle, TweakSelect } = window;

  return (
    <>
      <DesignCanvas>
        <DCSection id="brand" title="Brand · Pic-to-Plate" subtitle="Identity, palette, type, and voice.">
          <DCArtboard id="spec" label="01 · Brand spec" width={1180} height={760}>
            <div style={{ width: '100%', height: '100%', overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <BrandCard />
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="ios" title="iOS · Ingredients Input" subtitle="Three takes on the same brand: photo-led, voice-led, text-led.">
          <DCArtboard id="detected" label="A · Detected — photo-first" width={420} height={900}>
            <IOSDevice width={402} height={874}>
              <ScreenDetected />
            </IOSDevice>
          </DCArtboard>

          <DCArtboard id="conversation" label="B · Conversation — voice-first" width={420} height={900}>
            <IOSDevice width={402} height={874}>
              <ScreenConversation />
            </IOSDevice>
          </DCArtboard>

          <DCArtboard id="pantry" label="C · Pantry Grid — text-first" width={420} height={900}>
            <IOSDevice width={402} height={874}>
              <ScreenPantryGrid />
            </IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="web" title="Web · Ingredients Input" subtitle="Two-pane editorial layout. Capture left, live list right.">
          <DCArtboard id="desktop" label="D · Desktop · 1280×800" width={1280} height={800}>
            <ScreenWeb />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme">
          <TweakRadio
            label="Mode"
            value={values.theme}
            options={[{ label: 'Light', value: 'light' }, { label: 'Dark', value: 'dark' }]}
            onChange={(v) => setTweak('theme', v)}
          />
          <TweakColor label="Accent" value={values.accent} onChange={(v) => setTweak('accent', v)} />
          <div style={{ display: 'flex', gap: 6, padding: '4px 0' }}>
            {ACCENT_OPTIONS.map(a => (
              <button key={a.value} onClick={() => setTweak('accent', a.value)} style={{
                flex: 1, height: 28, borderRadius: 8,
                background: a.value, border: values.accent === a.value ? '2px solid #1B2420' : '1px solid rgba(0,0,0,0.1)',
                color: '#fff', fontFamily: 'Inter', fontSize: 11, cursor: 'pointer',
              }}>{a.label}</button>
            ))}
          </div>
        </TweakSection>

        <TweakSection label="Type">
          <TweakSelect
            label="Display font"
            value={values.displayFont}
            options={['Fraunces', 'Playfair', 'Inter']}
            onChange={(v) => setTweak('displayFont', v)}
          />
        </TweakSection>

        <TweakSection label="AI">
          <TweakToggle
            label="Show AI hints"
            value={values.showAIHints}
            onChange={(v) => setTweak('showAIHints', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

// crude color helpers
function tint(hex, amount) {
  const { r, g, b } = parseHex(hex);
  const mix = (c) => Math.round(c + (255 - c) * amount);
  return `rgb(${mix(r)}, ${mix(g)}, ${mix(b)})`;
}
function shade(hex, amount) {
  const { r, g, b } = parseHex(hex);
  const mix = (c) => Math.round(c * amount);
  return `rgb(${mix(r)}, ${mix(g)}, ${mix(b)})`;
}
function parseHex(hex) {
  const h = hex.replace('#','');
  return {
    r: parseInt(h.slice(0,2), 16),
    g: parseInt(h.slice(2,4), 16),
    b: parseInt(h.slice(4,6), 16),
  };
}

// Load Playfair on demand
const pf = document.createElement('link');
pf.rel = 'stylesheet';
pf.href = 'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap';
document.head.appendChild(pf);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
